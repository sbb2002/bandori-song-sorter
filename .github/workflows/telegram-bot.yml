name: Telegram bot (poll)

# 상시 서버 없이 Telegram 명령을 5분 주기로 수신·처리(반자동 파이프라인 제어).
# public 레포 = Actions 무제한·무료. 다운로드 안 함 — /detect 는 감지만, /pause·/resume 은
# 감지 크론 상태(actions/bot_state.json) 토글. GitHub 크론은 best-effort라 응답 ~5~15분 지연 가능.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write        # /pause·/resume 상태(actions/bot_state.json) 커밋

concurrency:
  group: telegram-bot     # getUpdates 중복 소비(409) 방지 — 동시에 하나만
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Poll & handle commands
        id: bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install pyyaml
          python src/tools/pipeline/telegram_bot.py

      # /pause·/resume 로 상태가 바뀐 경우만 커밋(현재 브랜치로 push → 테스트는 feature, 운영은 main).
      - name: Commit pause state (if changed)
        if: steps.bot.outputs.state_changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add actions/bot_state.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(bot): 감지 크론 상태 변경 [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
