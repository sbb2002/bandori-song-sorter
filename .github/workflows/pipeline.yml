name: New-song loader (detect + notify)

# 매일 23:00 KST(=14:00 UTC) + 수동. CI(데이터센터 IP)에서 YouTube 다운로드는 봇월로 불가함이
# 실증됨(세션 27, E2E 3회 hard-block) → 이 워크플로우는 **감지 + Telegram 알림만** 한다.
# 실제 다운로드~main 반영은 로컬 원커맨드(src/tools/pipeline/run_local.py)가 집(레지덴셜) IP에서 수행.
on:
  schedule:
    - cron: '0 14 * * *'      # 23:00 KST
  workflow_dispatch:
    inputs:
      notify_test:
        description: '[테스트] 캔드 Telegram 메시지 1건 전송(secrets 배선 확인). true 로 실행'
        required: false
        default: 'false'

permissions:
  contents: read              # 감지는 체크아웃 파일만 읽음(커밋 없음)

concurrency:
  group: new-song-loader
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 감지 = pyyaml 만으로 가볍게(collect_candidates: RSS 피드 + 커밋 YAML dedup, idempotent).
      # 신곡 있으면 미처리 곡 전체를 요약한 Telegram 1건 전송(0곡이면 무송신). 다운로드 안 함.
      - name: Detect new songs + notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # /pause 로 일시정지된 경우 감지·알림 스킵(bot_state.json, telegram-bot.yml 이 토글).
          if [ -f actions/bot_state.json ] && \
             python -c "import json,sys; sys.exit(0 if json.load(open('actions/bot_state.json')).get('paused') else 1)"; then
            echo "⏸ 일시정지 상태 — 감지·알림 스킵(/resume 로 재개)"
            exit 0
          fi
          python -m pip install --upgrade pip
          pip install pyyaml
          if [ "${{ github.event.inputs.notify_test }}" = "true" ]; then
            python actions/orchestrate.py --notify-test
          else
            python actions/orchestrate.py --detect-only --notify
          fi
