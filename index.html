<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BanG Dream! Album Sorter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    <style>
        :root { --bg: #0d0d0d; --card-bg: #1a1a1a; --txt: #eeeeee; --pink: #ff99aa; --border: #333333; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; display: flex; overflow: hidden; height: 100vh; }
        .main-container { display: flex; width: 100vw; height: 100vh; position: relative; }
        #tier-wrapper { background: #ffffff; width: 80px; flex-shrink: 0; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; display: flex; flex-direction: column; overflow: hidden; }
        #tier-wrapper.expanded { width: 100vw; }
        .tier-table { border: none; width: 100%; flex: 1; display: flex; flex-direction: column; background: #fff; }
        .tier-row { display: flex; min-height: 80px; border-bottom: 1px solid #eee; flex: 1; }
        .tier-label { width: 80px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; font-size: 1.2rem; flex-shrink: 0; }
        .drop-zone { flex: 1; display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; align-content: flex-start; }
        #tier-wrapper:not(.expanded) .drop-zone { display: none; }
        .tier-item { width: 70px; height: 70px; position: relative; cursor: grab; }
        .tier-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
        .del-btn { position: absolute; top: -5px; right: -5px; background: #ff4444; color: #fff; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff; z-index: 10; }
        #toggle-btn { position: absolute; left: 80px; top: 50%; transform: translateY(-50%); background: var(--pink); border: none; width: 28px; height: 60px; cursor: pointer; z-index: 110; border-radius: 0 12px 12px 0; transition: left 0.4s; }
        #tier-wrapper.expanded + #toggle-btn { left: calc(100vw - 28px); border-radius: 12px 0 0 12px; }
        .control-panel { flex: 1; display: flex; flex-direction: column; gap: 12px; padding: 15px; background: var(--bg); overflow-y: auto; }
        #tier-wrapper.expanded ~ .control-panel { display: none; }
        #preview-display { background: var(--card-bg); padding: 15px; border-radius: 8px; display: flex; gap: 15px; min-height: 120px; align-items: center; border: 1px solid var(--border); }
        #p-img { width: 90px; height: 90px; object-fit: cover; border-radius: 4px; }
        #t-info { font-size: 13px; color: #ccc; }
        .band-nav { display: flex; flex-wrap: wrap; gap: 6px; }
        .band-btn { background: #252525; color: #888; border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        .band-btn.active { background: var(--pink); color: #000; font-weight: bold; }
        .bank-container { background: var(--card-bg); border-radius: 8px; padding: 10px; flex: 1; border: 1px solid var(--border); }
        .band-content { display: none; flex-wrap: wrap; gap: 8px; }
        .band-content.active { display: flex; }
        .bank-item { width: 65px; height: 65px; cursor: pointer; }
        .bank-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
        .btn-save { background: var(--pink); color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; margin-top: auto; }
        @media (min-width: 1024px) {
            #tier-wrapper { width: 550px !important; }
            #tier-wrapper:not(.expanded) .drop-zone { display: flex; }
            #toggle-btn { display: none; }
        }
        .capturing .del-btn { display: none !important; }
    </style>
</head>

<script>
    // GitHub Pages 경로 문제를 해결하는 핵심 함수
    function fixPath(path) {
        if (!path) return '';
        if (path.startsWith('http') || path.startsWith('data:')) return path;
        
        // 역슬래시를 슬래시로 변경하고 앞뒤 공백 제거
        let cleanPath = path.replace(/\\/g, '/').trim();
        
        // 경로가 'assets/'로 시작한다면 그대로 반환하거나 './'를 붙임
        // 만약 sbb2002.github.io/bandori-album-sorter/ 환경이라면 
        // 상대 경로인 './assets/...' 가 가장 확실합니다.
        if (cleanPath.startsWith('/')) {
            cleanPath = cleanPath.substring(1);
        }
    
    return './' + cleanPath;
}

    function toggleTier() {
        const w = document.getElementById('tier-wrapper');
        const btn = document.getElementById('toggle-btn');
        w.classList.toggle('expanded');
        btn.innerText = w.classList.contains('expanded') ? '◀' : '▶';
    }

    function switchBand(name, btn) {
        document.querySelectorAll('.band-btn').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.band-content').forEach(x => x.classList.remove('active'));
        document.getElementById('b-' + name).classList.add('active');
    }

    function showInfo(el) {
        const d = JSON.parse(el.getAttribute('data-json'));
        const i = document.getElementById('p-img');
        i.src = fixPath(d.img_url);
        i.style.display = 'block';
        document.getElementById('t-info').innerHTML = `<b>${d.album_title}</b>${d.tracks.map(t=> `<div>${t.track_number}. ${t.name}</div>`).join('')}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        // 이미지 경로 초기화 (중요)
        document.querySelectorAll('.lazy-load').forEach(img => {
            img.src = fixPath(img.getAttribute('data-src'));
        });

        document.querySelectorAll('.band-content').forEach(c => {
            new Sortable(c, { 
                group: { name: 'shared', pull: 'clone', put: false }, 
                sort: false 
            });
        });

        document.querySelectorAll('.drop-zone').forEach(z => {
            new Sortable(z, {
                group: 'shared',
                animation: 150,
                onAdd: (e) => {
                    const item = e.item;
                    item.classList.add('tier-item');
                    if (!item.querySelector('.del-btn')) {
                        const b = document.createElement('div');
                        b.className = 'del-btn';
                        b.innerText = '✕';
                        b.onclick = () => item.remove();
                        item.appendChild(b);
                    }
                    // 드롭 시 이미지 경로가 유지되도록 보장
                    const img = item.querySelector('img');
                    if (img) img.src = fixPath(img.getAttribute('src') || img.getAttribute('data-src'));
                }
            });
        });
    });

    async function exportTier() {
        const area = document.getElementById('tier-capture-area');
        const wrapper = document.getElementById('tier-wrapper');
        wrapper.classList.add('expanded');
        document.body.classList.add('capturing');

        await new Promise(r => setTimeout(r, 600));

        domtoimage.toPng(area, { bgcolor: '#ffffff' })
            .then(dataUrl => {
                const link = document.createElement('a');
                link.download = `tier-${Date.now()}.png`;
                link.href = dataUrl;
                link.click();
            })
            .finally(() => {
                document.body.classList.remove('capturing');
                if (window.innerWidth < 1024) wrapper.classList.remove('expanded');
            });
    }
</script>
