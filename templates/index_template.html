<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BanG Dream! Tier Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg-color: #000; --text-color: #fff; --accent-pink: #ff99aa; --accent-blue: #4488ff; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        
        .main-container { display: flex; gap: 40px; justify-content: center; }

        /* 좌측 티어 보드 */
        #tier-wrapper { background: #fff; padding: 15px; border-radius: 4px; width: 450px; }
        .tier-table { border: 1px solid #444; width: 100%; border-collapse: collapse; }
        .tier-row { border-bottom: 1px solid #444; display: flex; min-height: 70px; }
        .tier-label { width: 70px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 18px; border-right: 1px solid #444; }
        .drop-zone { flex: 1; display: flex; flex-wrap: wrap; gap: 5px; padding: 5px; background: #fff; }

        /* 드롭된 앨범 스타일 */
        .tier-item { width: 60px; height: 60px; position: relative; cursor: pointer; }
        .tier-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 3px; }
        .del-btn { 
            position: absolute; top: -8px; right: -8px; background: red; color: #fff; 
            width: 20px; height: 20px; border-radius: 50%; font-size: 12px; 
            display: none; align-items: center; justify-content: center; font-weight: bold; z-index: 10;
        }
        .tier-item:hover .del-btn { display: flex; }

        /* 우측 영역 */
        .control-panel { width: 600px; display: flex; flex-direction: column; gap: 30px; }

        /* 우측 상단: 프리뷰 정보 */
        #preview-display { display: flex; gap: 20px; background: #000; border: 1px solid #333; padding: 20px; min-height: 300px; }
        #preview-img { width: 280px; height: 280px; object-fit: cover; border: 1px solid #444; display: none; }
        .track-info-container { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .track-item-row { display: flex; gap: 5px; align-items: center; }
        .t-num { background: var(--accent-pink); color: #fff; padding: 5px 12px; font-weight: bold; min-width: 30px; text-align: center; }
        .t-name { background: #fff; color: var(--accent-blue); padding: 5px 15px; flex: 1; font-weight: 500; cursor: pointer; }

        /* 우측 하단: 앨범 뱅크 */
        #album-bank { display: flex; flex-wrap: wrap; gap: 15px; padding: 10px; }
        .bank-item { width: 90px; height: 90px; cursor: pointer; transition: transform 0.2s; }
        .bank-item:hover { transform: scale(1.05); }
        .bank-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; border: 1px solid #222; }

        .btn-save { margin-top: 15px; background: #000; color: #fff; border: 1px solid #fff; padding: 10px; cursor: pointer; width: 100%; text-align: left; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-container">
    <!-- 좌측 -->
    <div id="tier-wrapper">
        <div class="tier-table">
            {% for label, color in [('S+', '#ff7f7f'), ('S', '#ff9999'), ('A+', '#ffbf7f'), ('A', '#ffff7f'), ('B+', '#bfff7f'), ('B', '#7fff7f'), ('C+', '#7fffff'), ('C', '#7f7fff'), ('D', '#bf7fff'), ('F', '#cccccc')] %}
            <div class="tier-row">
                <div class="tier-label" style="background: {{color}};">{{label}}</div>
                <div class="drop-zone"></div>
            </div>
            {% endfor %}
        </div>
        <button class="btn-save" onclick="exportTier()">이미지 결과 저장하기</button>
    </div>

    <!-- 우측 -->
    <div class="control-panel">
        <!-- 프리뷰 -->
        <div id="preview-display">
            <img id="preview-img" src="">
            <div id="track-info-container" class="track-info-container">
                <p id="placeholder-text" style="color:#666;">앨범을 클릭하여 수록곡을 확인하세요.</p>
            </div>
        </div>

        <!-- 앨범 뱅크 -->
        <div id="album-bank">
            {% for album in albums %}
            <div class="bank-item" 
                 data-album-json='{{ album | tojson | safe }}'
                 onclick="handleAlbumClick(this)">
                <img src="{{ album.img_url }}" alt="{{ album.album_title }}">
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
    // 1. 프리뷰 업데이트 함수
    function handleAlbumClick(element) {
        const albumData = JSON.parse(element.getAttribute('data-album-json'));
        const img = document.getElementById('preview-img');
        const container = document.getElementById('track-info-container');
        
        // 이미지 설정
        img.src = albumData.img_url;
        img.style.display = 'block';
        
        // 트랙 리스트 생성
        container.innerHTML = '';
        albumData.tracks.forEach(track => {
            const row = document.createElement('div');
            row.className = 'track-item-row';
            row.innerHTML = `
                <div class="t-num">${track.track_number}</div>
                <div class="t-name" onclick="window.open('${track.url}', '_blank')">${track.name}</div>
            `;
            container.appendChild(row);
        });
    }

    // 2. 드래그 앤 드롭 (SortableJS)
    new Sortable(document.getElementById('album-bank'), {
        group: { name: 'shared', pull: 'clone', put: false },
        sort: false,
        animation: 150
    });

    document.querySelectorAll('.drop-zone').forEach(zone => {
        new Sortable(zone, {
            group: 'shared',
            animation: 150,
            onAdd: function (evt) {
                const item = evt.item;
                item.className = 'tier-item';
                
                // 삭제 버튼 추가 (중복 방지)
                if (!item.querySelector('.del-btn')) {
                    const btn = document.createElement('div');
                    btn.className = 'del-btn';
                    btn.innerText = 'X';
                    btn.onclick = (e) => { e.stopPropagation(); item.remove(); };
                    item.appendChild(btn);
                }
            }
        });
    });

    // 3. 이미지 저장
    function exportTier() {
        html2canvas(document.querySelector("#tier-wrapper")).then(canvas => {
            const a = document.createElement('a');
            a.href = canvas.toDataURL("image/png");
            a.download = 'bang-dream-tier.png';
            a.click();
        });
    }
</script>
</body>
</html>
