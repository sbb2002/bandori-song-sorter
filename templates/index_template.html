<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Bang Dream Tier Maker</title>
    <!-- 외부 라이브러리 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #000; color: #fff; margin: 0; padding: 20px; }
        .main-layout { display: flex; gap: 30px; align-items: flex-start; }

        /* 좌측: 티어 보드 영역 */
        #tier-board-wrapper { background: #fff; padding: 10px; width: 400px; border-radius: 4px; }
        #tier-board { border: 1px solid #ccc; }
        .tier-row { display: flex; border-bottom: 1px solid #ccc; min-height: 60px; }
        .label { width: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; border-right: 1px solid #ccc; color: #000; }
        .drop-zone { flex-grow: 1; display: flex; flex-wrap: wrap; padding: 5px; gap: 5px; min-height: 50px; }

        /* 티어 내 배치된 아이템 */
        .tier-item { width: 45px; height: 45px; position: relative; cursor: pointer; }
        .tier-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }
        .delete-btn {
            position: absolute; top: -5px; right: -5px; background: rgba(255,0,0,0.9);
            color: white; border-radius: 50%; width: 16px; height: 16px;
            display: none; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; z-index: 10;
        }
        .tier-item:hover .delete-btn { display: flex; }

        /* 우측: 프리뷰 및 뱅크 영역 */
        .right-column { flex: 1; display: flex; flex-direction: column; gap: 20px; }

        /* 우측 상단: 상세 정보 프리뷰 */
        #preview-area { display: flex; gap: 20px; background: #000; padding: 20px; border: 1px solid #333; min-height: 320px; align-items: center; }
        #preview-img { width: 300px; height: 300px; object-fit: cover; border: 1px solid #444; }
        #preview-info { flex: 1; display: flex; flex-direction: row; gap: 5px; }
        
        .track-nums { display: flex; flex-direction: column; gap: 5px; }
        .track-num-box { background: #ff99aa; color: #fff; font-weight: bold; padding: 5px 15px; text-align: center; min-width: 30px; }
        
        .track-names { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; }
        .track-name-box { background: #fff; color: #4488ff; padding: 5px 20px; min-width: 150px; cursor: pointer; font-weight: 500; }

        /* 우측 하단: 앨범 뱅크 */
        #album-bank { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; background: #000; min-height: 150px; }
        .bank-item { width: 80px; height: 80px; cursor: pointer; transition: transform 0.1s; }
        .bank-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
        .bank-item:active { transform: scale(0.95); }

        .save-btn { margin-top: 15px; padding: 10px; width: 100%; background: #000; color: #fff; border: 1px solid #000; font-weight: bold; cursor: pointer; text-align: left; }
        .save-btn:hover { background: #333; }
    </style>
</head>
<body>

<div class="main-layout">
    <!-- 좌측 티어 보드 -->
    <div id="tier-board-wrapper">
        <div id="tier-board">
            {% for rank, color in [('S+', '#ff7f7f'), ('S', '#ff9999'), ('A+', '#ffbf7f'), ('A', '#ffff7f'), ('B+', '#bfff7f'), ('B', '#7fff7f'), ('C+', '#7fffff'), ('C', '#7f7fff'), ('D', '#bf7fff'), ('F', '#cccccc')] %}
            <div class="tier-row">
                <div class="label" style="background: {{ color }};">{{ rank }}</div>
                <div class="drop-zone" data-rank="{{ rank }}"></div>
            </div>
            {% endfor %}
        </div>
        <button class="save-btn" onclick="saveImage()">이미지 결과 저장하기</button>
    </div>

    <!-- 우측 컬럼 -->
    <div class="right-column">
        <!-- 상단 프리뷰 (클릭 시 노출) -->
        <div id="preview-area">
            <img id="preview-img" style="display:none;">
            <div id="preview-info">
                <div id="track-nums" class="track-nums"></div>
                <div id="track-names" class="track-names"></div>
            </div>
        </div>

        <!-- 하단 앨범 뱅크 -->
        <div id="album-bank">
            {% for album in albums %}
            <div class="bank-item" 
                 onclick='updatePreview({{ album | tojson | safe }})'
                 data-id="{{ loop.index }}">
                <img src="{{ album.img_url }}" alt="{{ album.album_title }}">
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
    // 1. Sortable 설정: 우측 뱅크 (복제 모드)
    new Sortable(document.getElementById('album-bank'), {
        group: {
            name: 'albums',
            pull: 'clone', // 드래그 시 복사본 생성
            put: false    // 뱅크로 다시 넣기 방지
        },
        sort: false,
        animation: 150
    });

    // 2. Sortable 설정: 좌측 드롭존
    document.querySelectorAll('.drop-zone').forEach(zone => {
        new Sortable(zone, {
            group: 'albums',
            animation: 150,
            onAdd: function (evt) {
                const item = evt.item;
                item.classList.add('tier-item');
                item.classList.remove('bank-item');

                // 삭제 버튼(X) 추가 및 기능 구현
                if (!item.querySelector('.delete-btn')) {
                    const btn = document.createElement('div');
                    btn.className = 'delete-btn';
                    btn.innerText = 'X';
                    btn.onclick = (e) => { e.stopPropagation(); item.remove(); };
                    item.appendChild(btn);
                }
            }
        });
    });

    // 3. 우측 상단 프리뷰 업데이트 기능
    function updatePreview(album) {
        const img = document.getElementById('preview-img');
        const numContainer = document.getElementById('track-nums');
        const nameContainer = document.getElementById('track-names');

        img.src = album.img_url;
        img.style.display = 'block';

        numContainer.innerHTML = '';
        nameContainer.innerHTML = '';

        album.tracks.forEach(track => {
            const numBox = document.createElement('div');
            numBox.className = 'track-num-box';
            numBox.innerText = track.track_number;

            const nameBox = document.createElement('div');
            nameBox.className = 'track-name-box';
            nameBox.innerText = track.name;
            nameBox.onclick = () => { if(track.url !== '-') window.open(track.url, '_blank'); };

            numContainer.appendChild(numBox);
            nameContainer.appendChild(nameBox);
        });
    }

    // 4. 결과 이미지 저장 기능
    function saveImage() {
        const target = document.querySelector("#tier-board-wrapper");
        html2canvas(target).then(canvas => {
            const link = document.createElement('a');
            link.download = 'bang-dream-tier-list.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
